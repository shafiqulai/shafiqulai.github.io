<!doctype html>
<html lang="en">
	<head>
		<!-- Google tag (gtag.js) -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-6SEFZQJHM1"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			gtag("js", new Date());

			gtag("config", "G-6SEFZQJHM1", {
				cookie_domain: "shafiqulai.github.io",
			});
		</script>

		<meta charset="utf-8" />
		<title>Shafiqul AI - Technical Blog</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Shafiqul AI - Technical Blog" />
		<meta name="author" content="MD SHAFIQUL ISLAM" />
		<link rel="icon" href="./img/others/favicon.ico" type="image/x-icon" />

		<!-- css -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
		<link rel="stylesheet" type="text/css" href="css/bootstrap.min.css" />
		<link rel="stylesheet" type="text/css" href="css/style.css" />
	</head>

	<body>
		<div id="wrapper">
			<div id="site-header"></div>

			<section id="main-content">
				<div class="container">
					<div class="row main-content-row">
						<!-- Featured post column -->
						<div class="col-lg-9" id="featured-section">
							<div id="top-blg-container" class="row">
								<!-- Top Blog post will be dynamically generated here -->
							</div>
						</div>

						<!-- Right column: categories sidebar -->
						<div class="col-lg-3 categories">
							<div class="categories-card" id="categories-sidebar">
								<div class="category-header">
									<img src="./img/others/categories.png" alt="categories" style="width: 24px; height: auto" />
									<h3>Categories</h3>
								</div>
								<ul id="categoryList">
									<!-- Categories will be generated dynamically with JavaScript -->
								</ul>
							</div>
						</div>

						<!-- Blog grid column -->
						<div class="col-lg-9" id="left-main">
							<div class="blog-title-bar">
								<img src="./img/others/blog.png" alt="blog post" style="width: 24px; height: auto" />
								<h2>Recent Blog Posts</h2>
							</div>
							<div id="postContainer" class="row">
								<!-- Blog posts will be dynamically generated here -->
							</div>
							<div class="load-more">
								<a href="#" id="loadMoreLink" class="load-more-button">Load More</a>
							</div>
						</div>
					</div>
				</div>
			</section>
			<div id="site-footer"></div>
		</div>
		<!-- end wrapper -->
		<!-- javascript -->
		<!-- Placed at the end of the document so the pages load faster -->
		<script type="text/javascript" src="js/bootstrap.bundle.min.js"></script>
		<script type="text/javascript" src="js/components.js"></script>
		<script type="text/javascript" src="js/site.js"></script>
		<script type="text/javascript" src="js/main.js"></script>
	</body>
</html>
